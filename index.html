<!DOCTYPE html>
<html>
<head>
<title>CinZoon Hub</title>
<style>
body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}
header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
}
nav{
text-align:center;
padding:10px;
background:#1e293b;
}
nav button{
margin:5px;
padding:10px 20px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}
nav button:hover{
background:#16a34a;
}
section{
display:none;
padding:20px;
text-align:center;
}
section.active{
display:block;
}
.movie, .tv{
display:inline-block;
margin:15px;
}
.movie img, .tv img{
width:150px;
border-radius:8px;
}
</style>
</head>

<body>

<header>🎬 CinZoon Hub</header>

<nav>
<button onclick="showSection('movies')">🎥 Movies</button>
<button onclick="showSection('tv')">📺 TV Series</button>
<button onclick="window.location='https://wa.me/94700000000'">💬 WhatsApp Service</button>
</nav>

<section id="movies">
<h2>Movies</h2>
<div class="movie">
<img src="https://via.placeholder.com/150x220">
<p>Movie 1</p>
</div>
<div class="movie">
<img src="https://via.placeholder.com/150x220">
<p>Movie 2</p>
</div>
</section>

<section id="tv">
<h2>TV Series</h2>
<div class="tv">
<img src="https://via.placeholder.com/150x220">
<p>Series 1</p>
</div>
<div class="tv">
<img src="https://via.placeholder.com/150x220">
<p>Series 2</p>
</div>
</section>

<script>
function showSection(id){
document.querySelectorAll('section').forEach(sec=>{
sec.classList.remove('active');
});
document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>

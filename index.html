<!-- Chatbot button -->
<div id="chatbot" style="position:fixed; bottom:20px; right:20px;">
  <button onclick="openChat()">Chat with us</button>
</div>

<!-- Chat popup -->
<div id="chatbox" style="display:none; position:fixed; bottom:70px; right:20px; width:250px; height:300px; border:1px solid #333; background:#fff; padding:10px;">
  <div id="chatlogs" style="height:220px; overflow:auto;"></div>
  <input type="text" id="userInput" placeholder="Type here..." style="width:70%;">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
function openChat(){
  document.getElementById("chatbox").style.display = "block";
}

function sendMsg(){
  let input = document.getElementById("userInput").value.toLowerCase();
  let chatlogs = document.getElementById("chatlogs");

  let reply = "Sorry, I didn't understand";

  if(input.includes("movie")){
    reply = "Avengers: Rs.150, Stranger Things: Rs.200";
  } else if(input.includes("tv")){
    reply = "Stranger Things S1: Rs.200, Our Universe S1: Rs.180";
  } else if(input.includes("whatsapp")){
    reply = "Click here to contact: https://wa.me/yournumber";
  }

  chatlogs.innerHTML += `<p><b>You:</b> ${input}</p>`;
  chatlogs.innerHTML += `<p><b>Bot:</b> ${reply}</p>`;
  document.getElementById("userInput").value = "";
  chatlogs.scrollTop = chatlogs.scrollHeight;
}
</script>

<button class="main-btn" onclick="goToSubmit()">+ Submit Link</button>

<script>
function goToSubmit(){
  // Show overlay animation first
  let overlay = document.createElement("div");
  overlay.style.position="fixed";
  overlay.style.top=0;
  overlay.style.left=0;
  overlay.style.width="100%";
  overlay.style.height="100%";
  overlay.style.background="rgba(0,0,0,0.9)";
  overlay.style.display="flex";
  overlay.style.justifyContent="center";
  overlay.style.alignItems="center";
  overlay.style.flexDirection="column";
  overlay.style.color="#0ff";
  overlay.style.fontSize="24px";
  overlay.innerHTML = `<div style="border:6px solid #222; border-top:6px solid #0ff; border-radius:50%; width:60px; height:60px; animation:spin 1s linear infinite; margin-bottom:20px;"></div>
  Processing...`;
  document.body.appendChild(overlay);

  // Spin animation
  let style = document.createElement("style");
  style.innerHTML=`@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}`;
  document.head.appendChild(style);

  setTimeout(()=>{
    window.location.href="submit.html"; // redirect to next page
  },2000);
}
</script>

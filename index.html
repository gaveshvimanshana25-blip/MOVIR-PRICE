<!DOCTYPE html>
<html>
<head>
<title>CinZoon Video Downloader</title>

<style>
body{
background:#0f172a;
font-family:Arial;
text-align:center;
color:white;
}

.box{
margin-top:100px;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}
</style>
</head>

<body>

<div class="box">

<h1>🎬 CinZoon Video Downloader</h1>

<p>YouTube | TikTok | Facebook</p>

<input type="text" id="link" placeholder="Paste Video Link Here">

<br>

<button onclick="download()">Download Video</button>

</div>

<script>

function download(){

let url = document.getElementById("link").value;

if(url.includes("youtube")){
window.open("https://en.savefrom.net/#url=" + url);
}

else if(url.includes("tiktok")){
window.open("https://snaptik.app/?url=" + url);
}

else if(url.includes("facebook")){
window.open("https://fdown.net/?url=" + url);
}

else{
alert("Please Enter Valid Video Link");
}

}

</script>

</body>

</html>

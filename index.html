<!DOCTYPE html>
<html>
<head>
<title>Submit Your Link</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
padding:20px;
margin:20px auto;
width:300px;
border-radius:10px;
}

input,button{
width:90%;
padding:10px;
margin:5px;
}

.link-box{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>🔥 Submit Your Link</h1>

<div class="container">

<input id="title" placeholder="Title">

<input id="url" placeholder="Website Link">

<button onclick="addLink()">Submit</button>

</div>

<h2>🌐 Submitted Links</h2>

<div id="links"></div>

<script>

function addLink(){

let title = document.getElementById("title").value
let url = document.getElementById("url").value

let links = JSON.parse(localStorage.getItem("links")) || []

links.push({title,url})

localStorage.setItem("links",JSON.stringify(links))

showLinks()

}

function showLinks(){

let links = JSON.parse(localStorage.getItem("links")) || []

let html=""

links.forEach(l=>{
html+=`<div class="link-box">
<a href="${l.url}" target="_blank">${l.title}</a>
</div>`
})

document.getElementById("links").innerHTML=html

}

showLinks()

</script>

</body>
</html>
